<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | AgriPro</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=DM+Sans:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --color-primary: #1A4D2E;
      --color-highlight: #F4A900;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: #F7FAF4;
      color: #0D1A12;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .icon {
      font-size: 3rem;
      color: var(--color-primary);
      margin-bottom: 1.5rem;
      opacity: 0.4;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      font-variation-settings: 'opsz' 100;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }
    p {
      color: #4A5E52;
      line-height: 1.65;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1.75rem;
      background: var(--color-primary);
      color: #fff;
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #0D2B18; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon" aria-hidden="true"><i class="fa-solid fa-seedling"></i></div>
    <h1>Page not found</h1>
    <p>This page doesn&rsquo;t exist or may have moved. Let&rsquo;s get you back to AgriPro.</p>
    <a href="/" class="btn">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      Back to AgriPro
    </a>
  </div>
</body>
</html>
